name: Create GitHub Release

on:
  # pull_request event is required only for autolabeler
  pull_request:
    # Only following types are handled by the action, but one can default to all as well
    types: [opened, reopened, synchronize]
  workflow_run:
    workflows: ["Kotlin JVM CI with Gradle"]
    types: [completed]
    branches:
      - main
  # pull_request_target event is required for autolabeler to support PRs from forks
  # pull_request_target:
  #   types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  update_release_draft:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'push'
    permissions:
      # write permission is required to create a github release
      contents: write
      # write permission is required for autolabeler
      # otherwise, read permission is required at least
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (workflow_run)
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve latest tag (workflow_run)
        if: github.event_name == 'workflow_run'
        id: latest_tag
        run: |
          TAG=$(git tag --list 'v*' --sort=-v:refname | head -n 1)
          if [ -z "$TAG" ]; then
            echo "No v* tags found. Skipping release-drafter for workflow_run."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Create draft release (workflow_run)
        if: github.event_name == 'workflow_run' && steps.latest_tag.outputs.found == 'true'
        uses: release-drafter/release-drafter@v6
        with:
          name: ${{ steps.latest_tag.outputs.tag }}
          tag: ${{ steps.latest_tag.outputs.tag }}
          version: ${{ steps.latest_tag.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update release (pull_request)
        if: github.event_name == 'pull_request'
        uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
