databaseChangeLog:
  - changeSet:
      id: 1
      author: Viktor Samokhin
      sql:
        - "CREATE SCHEMA IF NOT EXISTS schema1; CREATE SCHEMA IF NOT EXISTS schema2;"
      changes:
        - createTable:
            schemaName: schema1
            tableName: users
            columns:
              - column:
                  name: user_id
                  type: int
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: varchar(255)
              - column:
                  name: email
                  type: varchar(255)
        - createTable:
            schemaName: schema2
            tableName: products
            columns:
              - column:
                  name: product_id
                  type: int
                  constraints:
                    primaryKey: true
              - column:
                  name: title
                  type: varchar(255)
